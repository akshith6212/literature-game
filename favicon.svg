<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#1a1a2e"/>
  <!-- Subtle inner border -->
  <rect x="2" y="2" width="96" height="96" rx="16" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>

  <!-- 2 × 2 suit grid, vertically centred with dominant-baseline="central" -->
  <!-- Top-left:  ♠ (dark / light text) -->
  <text x="27" y="30" font-family="serif" font-size="38"
        text-anchor="middle" dominant-baseline="central" fill="#e8eaf6">♠</text>
  <!-- Top-right: ♥ (red) -->
  <text x="73" y="30" font-family="serif" font-size="38"
        text-anchor="middle" dominant-baseline="central" fill="#e94560">♥</text>
  <!-- Bottom-left:  ♦ (red) -->
  <text x="27" y="72" font-family="serif" font-size="38"
        text-anchor="middle" dominant-baseline="central" fill="#e94560">♦</text>
  <!-- Bottom-right: ♣ (dark / light text) -->
  <text x="73" y="72" font-family="serif" font-size="38"
        text-anchor="middle" dominant-baseline="central" fill="#e8eaf6">♣</text>
</svg>
